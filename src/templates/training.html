<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研修案内</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/sidechat.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/conditions.css') }}">
    <style>
        /* --- Layout --- */
        .practice-container {
            display: flex;
            height: calc(100vh - 60px - 20px); /* ヘッダー・フッター分を引く */
            overflow: hidden;
            position: relative;
        }
        .main-area {
            flex: 1;
            padding: var(--space-3);
            overflow-y: auto;
            margin-right: var(--space-2);
        }
        .main-area > h2 {
            margin-bottom: var(--space-2);
        }

        .training-cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--space-3);
        }

        /* c-card内部のレイアウト用 */
        .card__header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--space-1);
        }
        .card__category {
            background-color: var(--accent-2);
            color: var(--mono-400);
            padding: 2px var(--space-1);
            border-radius: var(--radius-s);
            font-size: var(--fs-caption);
            flex-shrink: 0;
        }
        .card__description {
            font-size: var(--fs-data);
            margin-bottom: var(--space-3);
            flex-grow: 1;
        }
        .card__meta {
            display: flex;
            justify-content: space-between;
            font-size: var(--fs-caption);
            color: var(--mono-300);
        }
    </style>
</head>
<body>
    {% include "partials/header.html" %}

    <div class="practice-container">
        <main id="main-area" class="main-area">
            <h2>研修検索</h2>
            <div id="initial-message">
                <p>右側のチャットで、希望する研修の条件を設定してください。</p>
            </div>

            <div id="results-area" class="hidden">
                <section class="c-card search-conditions-wrapper">
                    <div id="filter-display-area">
                        <!-- JSでフィルター条件を追加 -->
                    </div>
                </section>
                <div id="training-cards-container">
                    <!-- JSで研修カードを追加 -->
                </div>
            </div>
        </main>

        {% include "partials/chat_panel.html" %}
    </div>

    {% include "partials/footer.html" %}

    <script src="{{ url_for('static', path='js/common.js') }}"></script>
    <script src="{{ url_for('static', path='js/chat_manager.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Main Area UI Elements ---
            const initialMessage = document.getElementById('initial-message');
            const resultsArea = document.getElementById('results-area');
            const filterDisplayArea = document.getElementById('filter-display-area');
            const trainingCardsContainer = document.getElementById('training-cards-container');

            // --- State ---
            let currentFilters = [];
            let conversationId = '';
            const currentUserId = 'user-' + Math.random().toString(36).substr(2, 9);
            let chatApp;

            // --- Data from Server ---
            const TRAININGS = JSON.parse('{{ trainings_data | tojson }}');
            const USER_SKILLS = JSON.parse('{{ user_skills_data | tojson }}');

            // 研修カードを表示する関数
            const renderTrainingCards = (trainings) => {
                trainingCardsContainer.innerHTML = '';
                
                if (!trainings || trainings.length === 0) {
                    trainingCardsContainer.innerHTML = '<p>条件に一致する研修が見つかりませんでした。</p>';
                    return;
                }

                trainings.forEach(t => {
                    const card = document.createElement('div');
                    card.className = 'c-card';
                    card.innerHTML = `
                        <div class="card__header">
                            <h3 class="c-card__title">${t.title}</h3>
                            ${t.matching_rate ? `<div class="card__matching" style="margin-top: 8px; font-weight: bold; color: var(--primary);">マッチング率: ${t.matching_rate}</div>` : ''}
                        </div>
                        <p class="card__description">${t.description}</p>
                        <div class="card__meta">
                            <span>レベル: ${t.level}</span>
                            <span>期間: ${t.duration}</span>
                        </div>
                        ${t.held_at ? `<div class="card__meta"><span>開催日時: ${t.held_at}</span></div>` : ''}
                        ${t.location ? `<div class="card__meta"><span>場所: ${t.location}</span></div>` : ''}
                        ${t.target ? `<div class="card__meta"><span>対象: ${t.target}</span></div>` : ''}
                    `;
                    trainingCardsContainer.appendChild(card);
                });
            };

            // 検索結果表示のメイン処理
            const displayTrainingResults = (filters, results) => {
                currentFilters = filters || [];

                initialMessage.classList.add('hidden');
                resultsArea.classList.remove('hidden');

                // フィルタータグ表示（Difyから条件が返ってきた場合のみ表示）
                filterDisplayArea.innerHTML = '';
                filterDisplayArea.innerHTML = '<span class="condition-label mr-2">検索条件</span>';

                currentFilters.forEach(tag => {
                    const tagEl = document.createElement('span');
                    tagEl.className = 'filter-tag';
                    tagEl.dataset.filter = tag;
                    tagEl.innerHTML = `${tag}<button class="close-btn" title="削除">&times;</button>`;
                    filterDisplayArea.appendChild(tagEl);
                });

                // 研修カード表示 (filtered_results があればそれを使用、なければ TRAININGS 全件などを表示可能だが、基本は結果を待つ)
                renderTrainingCards(results);
            };

            // フィルター削除イベント
            filterDisplayArea.addEventListener('click', (e) => {
                if (e.target.classList.contains('close-btn') || e.target.closest('.close-btn')) {
                    const btn = e.target.classList.contains('close-btn') ? e.target : e.target.closest('.close-btn');
                    const filterToRemove = btn.parentElement.dataset.filter;
                    currentFilters = currentFilters.filter(f => f !== filterToRemove);

                    // UIからタグを削除
                    btn.parentElement.remove();

                    // 既存の再検索ボタンがあれば削除
                    const existingBtn = document.getElementById('research-btn');
                    if (existingBtn) {
                        existingBtn.remove();
                    }

                    // チャットにボットからのメッセージを追加
                    if (chatApp && typeof chatApp.appendMessage === 'function') {
                        chatApp.appendMessage('assistant', '検索条件が変更されました。下のボタンで再検索してください。');
                    }

                    // 再検索ボタンをチャットログ内に作成・表示
                    const chatLog = document.querySelector('.chat-log') || document.getElementById('chat-log');
                    if (chatLog) {
                        const optionsDiv = document.createElement('div');
                        optionsDiv.className = 'chat-options-container';

                        const researchBtn = document.createElement('button');
                        researchBtn.className = 'chat-option-btn';
                        researchBtn.textContent = '再検索';

                        researchBtn.onclick = () => {
                            const chatInput = document.querySelector('.chat-input');
                            const chatSendBtn = document.querySelector('.chat-send-btn');
                            if (chatInput && chatSendBtn) {
                                chatInput.value = '再検索してください。';
                                chatSendBtn.click();
                            }
                            optionsDiv.remove();
                        };

                        optionsDiv.appendChild(researchBtn);
                        chatLog.appendChild(optionsDiv);
                        chatLog.scrollTop = chatLog.scrollHeight;
                    }
                }
            });

            // --- Chat Setup ---
            const handleChatSubmit = async (message, appendMessage) => {
                try {
                    const payload = {
                        message: message,
                        conversation_id: conversationId,
                        user_id: currentUserId,
                        mode: "研修情報",
                        current_conditions: currentFilters.join(','),
                        training_sessions: JSON.stringify(TRAININGS),
                        user_skills: JSON.stringify(USER_SKILLS)
                    };

                    const data = await sendToDify(payload);

                    // 会話ID更新
                    if (data.conversation_id) conversationId = data.conversation_id;
                    
                    const parsedData = parseDifyResponse(data.answer);

                    // 1. メッセージ表示
                    appendMessage('assistant', parsedData.message || data.answer);

                    // 2. 検索結果の更新 (filtered_results を優先して使用)
                    if (parsedData.filtered_results && Array.isArray(parsedData.filtered_results)) {
                        displayTrainingResults(parsedData.conditions, parsedData.filtered_results);
                    } else if (parsedData.conditions && Array.isArray(parsedData.conditions)) {
                        // fallback: 結果が直接来ない場合は条件だけ表示（ただし中身は空になる可能性があるため注意）
                        // 今回の要件では filtered_results が来ること前提
                        displayTrainingResults(parsedData.conditions, []); 
                    }

                    // 3. 提案ボタンの表示
                    displayOptions(parsedData.options);

                } catch (error) {
                    console.error("【チャットエラー詳細】:", error);
                    appendMessage('assistant', 'すみません、エラーが発生しました。もう一度お試しください。');
                }
            };

            chatApp = setupChat({
                pageType: 'training',
                handleSubmit: handleChatSubmit,
                initialMessage: 'こんにちは。ご希望の言語や難易度を教えていただければ、最適な研修を検索します。'
            });
        });
    </script>
</body>
</html>
