<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <style>
        .chat-page {
            height: calc(100vh - 170px - var(--footer-height));
            padding-bottom: var(--space-3);
            display: flex;
        }

        .chat-panel {
            width: 100%;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .chat-log {
            background-color: var(--mono-100);
            border: var(--border-standard);
            border-radius: var(--radius-m);
            padding: var(--space-3);
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            gap: var(--space-2);
            overflow-y: auto;
        }

        .chat-row {
            display: flex;
        }

        .chat-row--user {
            justify-content: flex-end;
        }

        .chat-row--assistant {
            justify-content: flex-start;
        }

        .chat-bubble {
            max-width: min(80%, 720px);
            border-radius: var(--radius-m);
            padding: var(--space-2) var(--space-3);
            white-space: pre-wrap;
            word-break: break-word;
            border: var(--border-standard);
        }

        .chat-bubble--user {
            background-color: var(--accent-2);
            border-color: var(--accent-1);
            color: var(--mono-400);
        }

        .chat-bubble--assistant {
            background-color: var(--mono-100);
            color: var(--mono-400);
        }

        .chat-composer {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: end;
            gap: var(--space-2);
            margin-top: var(--space-2);
        }

        .chat-input {
            resize: none;
            min-height: 44px;
            max-height: 120px;
        }

        .chat-send-btn {
            padding: 6px 12px;
            font-size: var(--fs-data);
            line-height: 1.2;
            min-width: 72px;
            background-color: var(--accent-1);
            color: var(--mono-100);
            border: none;
        }

        @media (max-width: 900px) {
            .chat-page {
                height: calc(100vh - 90px - var(--footer-height));
            }

            .chat-bubble {
                max-width: 100%;
            }

{% block page_scripts %}
<script>
  window.__USER_DATA__ = {
    user_id:      {{ user.user_id if user else 1 }},
    current_role: "{{ user.current_role if user else '' }}",
    target_role:  "{{ user.target_role if user else '' }}",
    name:         "{{ user.name if user else '' }}"
  };
</script>
<script src="{{ url_for('static', path='js/chat.js') }}?v=3"></script>
{% endblock %}
