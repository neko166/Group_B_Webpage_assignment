<aside id="chat-area" class="chat-area">
    <div id="chat-resizer" class="resizer" title="ドラッグしてリサイズ"></div>
    <button id="toggle-chat-btn" title="チャットパネルを閉じる">〉</button>
    <div class="chat-content">
        <h4>AIチャット</h4>
        <section id="chat-log" class="chat-log" aria-label="チャットログ"></section>
        <form id="chat-form" class="chat-composer" novalidate>
            <textarea id="chat-input" class="chat-input" name="chat-input" rows="1" placeholder="メッセージを入力" required></textarea>
            <button id="send-button" type="submit" class="btn chat-send-btn" title="送信">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 19V5M5 12l7-7 7 7"/>
                </svg>
            </button>
        </form>
    </div>
</aside>
